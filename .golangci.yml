# Config for golangci-lint v2
# Sourced from y-maeda1116/security-base/configs/.golangci.yml
version: "2"

run:
  timeout: 5m

linters:
  enable:
    - gosec
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign

linters-settings:
  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G104
  errcheck:
    check-type-assertions: true
    check-blank: true

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
