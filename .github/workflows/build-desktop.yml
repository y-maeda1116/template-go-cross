# .github/workflows/build-desktop.yml
name: Build Desktop

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.22'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

    - name: Cache Node modules
      uses: actions/cache@v4
      with:
        path: cmd/desktop/frontend/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/cmd/desktop/frontend/package-lock.json') }}

    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Install system dependencies
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-0 libgtk-3-dev pkg-config
          # Set PKG_CONFIG_PATH to find all .pc files
          export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:/usr/lib/pkgconfig:$PKG_CONFIG_PATH"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
        elif [ "$RUNNER_OS" = "Darwin" ]; then
          # macOS dependencies are usually available by default
          echo "No additional dependencies needed for macOS"
        elif [ "$RUNNER_OS" = "Windows" ]; then
          # Windows dependencies are usually available by default
          echo "No additional dependencies needed for Windows"
        fi
      shell: bash

    - name: Install dependencies
      run: |
        go mod download
        cd cmd/desktop/frontend && npm install
      shell: bash

    - name: Build Desktop
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:/usr/lib/pkgconfig:$PKG_CONFIG_PATH"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
        fi
        cd cmd/desktop && wails build -clean -tags webview2
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: MyApp-${{ matrix.os }}
        path: build/
